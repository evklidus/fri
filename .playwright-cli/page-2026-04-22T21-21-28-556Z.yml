      - generic [ref=e1466]: Methodology
      - heading "The Formula" [level=2] [ref=e1467]
      - paragraph [ref=e1468]: Fair, transparent, and position-neutral. Every component is publicly auditable.
    - generic [ref=e1469]:
      - generic [ref=e1470]: FRI = (P × 0.35) + (S × 0.20) + (F × 0.20) + (M × 0.15) + (C × 0.10)
      - text: All components normalized to 0–100 scale · Updated every 24 hours · Live news events trigger immediate recalculation
    - generic [ref=e1471]:
      - generic [ref=e1472]:
        - heading "🏟️ Field Performance" [level=4] [ref=e1473]
        - generic [ref=e1474]: "Weight: 35%"
        - paragraph [ref=e1475]: Stats normalized by position and league average. GK measured by saves, DEF by tackles/interceptions, MID by key passes, FWD by goals per 90. Age-adjusted for veterans.
      - generic [ref=e1476]:
        - heading "📱 Social Influence" [level=4] [ref=e1477]
        - generic [ref=e1478]: "Weight: 20%"
        - paragraph [ref=e1479]: Log-scaled follower count across Instagram, X, TikTok. Weighted by engagement rate and 30-day follower growth. Prevents megastars from crowding out everyone else.
      - generic [ref=e1480]:
        - heading "🗳️ Fan Sentiment" [level=4] [ref=e1481]
        - generic [ref=e1482]: "Weight: 20%"
        - paragraph [ref=e1483]: Rolling weekly polls + per-match fan ratings. Verified voters only (no bots). Blended 60/40 between structured polls and post-match crowd ratings.
      - generic [ref=e1484]:
        - heading "📰 Media Score" [level=4] [ref=e1485]
        - generic [ref=e1486]: "Weight: 15%"
        - paragraph [ref=e1487]: NLP sentiment analysis on news articles from 200+ outlets. Positive coverage raises score, negative stories lower it. Weighted by media outlet authority ranking.
      - generic [ref=e1488]:
        - heading "⚖️ Character Index" [level=4] [ref=e1489]
        - generic [ref=e1490]: "Weight: 10%"
        - paragraph [ref=e1491]: Yellow/red cards, confirmed scandals, fan conflicts, referee disputes subtract points. Charity work and fair play awards add. Older incidents decay 20% weight per year.
