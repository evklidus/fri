services:
  postgres:
    image: postgres:17-alpine
    container_name: fri-postgres
    environment:
      POSTGRES_DB: fri
      POSTGRES_USER: fri
      POSTGRES_PASSWORD: fri
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fri -d fri"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: build/package/Dockerfile
    container_name: fri-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DATABASE_URL: postgres://fri:fri@postgres:5432/fri?sslmode=disable
      SOURCE_HTML_PATH: /app/web/source/fri-index.html
      WEB_DIR: /app/web/static
      DB_MAX_CONNS: 10
    ports:
      - "8080:8080"

volumes:
  postgres-data:

